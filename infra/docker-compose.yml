services:
  mobile:
    image: node:24.11-alpine
    working_dir: /workspace
    command: sh -lc "corepack enable && sleep infinity"
    volumes:
      - ..:/workspace
    profiles: ["mobile"]

  backend:
    image: hexpm/elixir:1.18.4-erlang-28-debian-bookworm-slim
    working_dir: /workspace/apps/backend
    command: sh -lc "mix local.hex --force && mix local.rebar --force && sleep infinity"
    environment:
      MIX_ENV: dev
      DATABASE_URL: ecto://postgres:postgres@postgres/snack_dev
    volumes:
      - ..:/workspace
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["backend"]

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: snack_dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d snack_dev"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
